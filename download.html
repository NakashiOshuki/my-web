<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Downloads</title>
<style>
*{
    box-sizing:border-box;
}
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:url("https://raw.githubusercontent.com/NakashiOshuki/nakashioshuki.github.io/main/Nekoha-Shizuku.png") no-repeat center center fixed;
    background-size:cover;
    background-color:#1b1b1b;
    color:white;
}
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    z-index:-1;
}
h1{
    text-align:center;
    padding:20px 0;
    margin:0;
}
#container{
    padding-bottom:40px;
}
.version-box{
    background:#2a2a2a;
    margin:10px auto;
    width:90%;
    max-width:900px;
    border-radius:8px;
    overflow:hidden;
    transition:0.3s ease;
}
.version-header{
    padding:12px 16px;
    height:45px;
    display:flex;
    align-items:center;
    font-weight:bold;
    background:#333;
    cursor:pointer;
}
.version-content{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.4s ease;
    padding:0 16px;
}
.version-box.active .version-content{
    max-height:300px;
    padding:15px 16px;
}
.download-btn{
    background:#4CAF50;
    border:none;
    padding:8px 16px;
    margin:5px 8px 5px 0;
    color:white;
    border-radius:4px;
    cursor:pointer;
    font-size:14px;
}
.download-btn:hover{
    background:#43a047;
}
.progress{
    width:100%;
    background:#444;
    height:10px;
    border-radius:5px;
    margin-top:10px;
}
.progress-bar{
    width:0%;
    height:100%;
    background:lime;
    border-radius:5px;
    transition:width 0.1s linear;
}
</style>
</head>
<body>

<h1>Minecraft Version Downloads</h1>
<div id="container"></div>

<script>
const container = document.getElementById("container");

for(let i = 1; i <= 9; i++){

    const box = document.createElement("div");
    box.className = "version-box";

    const header = document.createElement("div");
    header.className = "version-header";
    header.textContent = "Minecraft Version " + i;

    const content = document.createElement("div");
    content.className = "version-content";

    if(i % 3 === 0){
        const btn1 = document.createElement("button");
        btn1.className = "download-btn";
        btn1.textContent = "Download Client";

        const btn2 = document.createElement("button");
        btn2.className = "download-btn";
        btn2.textContent = "Download Server";

        content.appendChild(btn1);
        content.appendChild(btn2);
    }else{
        const btn = document.createElement("button");
        btn.className = "download-btn";
        btn.textContent = "Download";
        content.appendChild(btn);
    }

    const progress = document.createElement("div");
    progress.className = "progress";

    const bar = document.createElement("div");
    bar.className = "progress-bar";

    progress.appendChild(bar);
    content.appendChild(progress);

    header.addEventListener("click", function(){
        box.classList.toggle("active");
    });

    content.addEventListener("click", function(e){
        if(e.target.classList.contains("download-btn")){
            e.stopPropagation();
            bar.style.width = "0%";
            let width = 0;
            const interval = setInterval(function(){
                width += 5;
                bar.style.width = width + "%";
                if(width >= 100){
                    clearInterval(interval);
                }
            },100);
        }
    });

    box.appendChild(header);
    box.appendChild(content);
    container.appendChild(box);
}
</script>

</body>
</html>
