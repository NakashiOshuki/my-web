<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Hacking</title>
    <style>
        :root {
            --bg: #000;
            --glass: rgba(30, 30, 30, 0.85);
            --item: rgba(255, 255, 255, 0.05);
            --green: #30d158;
        }

        body {
            margin: 0;
            padding: 20px;
            background: var(--bg);
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 360px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            height: 65px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 50px;
        }

        .container.active {
            height: 440px;
        }

        .header {
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            cursor: pointer;
        }

        .header span {
            color: white;
            font-size: 18px;
            font-weight: 600;
        }

        .arrow {
            width: 8px;
            height: 8px;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
            transform: rotate(45deg);
            transition: 0.3s;
        }

        .active .arrow {
            transform: rotate(-135deg);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 10px 15px 25px 15px;
            opacity: 0;
            transition: 0.4s;
        }

        .active .grid {
            opacity: 1;
        }

        .box {
            position: relative;
            aspect-ratio: 1/1;
            background: var(--item);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.03);
            overflow: hidden;
        }

        .box i {
            font-style: normal;
            font-size: 20px;
            font-weight: bold;
            color: var(--green);
            z-index: 2;
        }

        .box span {
            font-size: 10px;
            opacity: 0.7;
            z-index: 2;
        }

        .glow {
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, rgba(48, 209, 88, 0.4) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1;
        }

        .box:hover .glow {
            opacity: 1;
        }

        .box:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="container" id="menu" onclick="toggle()">
        <div class="header">
            <span>Minecraft hacking</span>
            <div class="arrow"></div>
        </div>

        <div class="grid">
            <a href="#" class="box"><div class="glow"></div><i>V1</i><span>Download</span></a>
            <a href="#" class="box"><div class="glow"></div><i>V2</i><span>Download</span></a>
            <a href="#" class="box"><div class="glow"></div><i>V3</i><span>Download</span></a>
            <a href="#" class="box"><div class="glow"></div><i>V4</i><span>Download</span></a>
            <a href="#" class="box"><div class="glow"></div><i>V5</i><span>Download</span></a>
            <a href="#" class="box"><div class="glow"></div><i>V6</i><span>Download</span></a>
            <a href="#" class="box"><div class="glow"></div><i>V7</i><span>Download</span></a>
            <a href="#" class="box"><div class="glow"></div><i>V8</i><span>Download</span></a>
            <a href="#" class="box"><div class="glow"></div><i>V9</i><span>Download</span></a>
        </div>
    </div>

    <script>
        function toggle() {
            document.getElementById('menu').classList.toggle('active');
        }

        document.querySelectorAll('.box').forEach(box => {
            box.addEventListener('mousemove', e => {
                const rect = box.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const glow = box.querySelector('.glow');
                glow.style.left = x + 'px';
                glow.style.top = y + 'px';
            });
        });
    </script>

</body>
</html>
